name: pos_delivery
description: "POS Delivery Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  connectivity_plus: ^6.1.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  geolocator: ^11.0.0
  flutter_foreground_task: ^8.13.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"